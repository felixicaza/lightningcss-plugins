packages:
   - packages/*

catalog:
   "@types/node": 22.14.1
   typescript: 5.8.3

catalogs:
   build:
      tsup: 8.4.0
   dev:
      tsx: 4.19.3
   lint:
      "@felixicaza/eslint-config": 0.1.2
      "@felixicaza/oxlint-config": 0.1.3
      eslint: 9.39.4
      jiti: 2.7.0
      nano-staged: 1.0.2
      oxlint: 1.67.0
      simple-git-hooks: 2.13.1
      typescript-eslint: 8.26.0
   peer:
      lightningcss: 1.29.3
   testing:
      "@vitest/coverage-v8": 3.1.2
      vitest: 3.1.2
   releasing:
      bumpp: 10.1.0

packageExtensions:
   "oxlint-plugin-complexity@*":
      dependencies:
         "@oxlint/plugins": "*"

minimumReleaseAgeExclude:
   - "@felixicaza/eslint-config"
   - "@felixicaza/oxlint-config"

trustPolicyExclude:
   - "undici-types@6.21.0"
   - "synckit@0.10.4"
   - "chokidar@4.0.3"
   - "eslint-import-resolver-typescript@3.10.1"
   - "semver@6.3.1"

allowBuilds:
   esbuild: true
   simple-git-hooks: true
   unrs-resolver: true

saveExact: true
blockExoticSubdeps: true
autoInstallPeers: false
minimumReleaseAge: 2880
trustPolicy: no-downgrade
strictPeerDependencies: true
strictDepBuilds: true
dedupePeers: true
shellEmulator: true
color: always
